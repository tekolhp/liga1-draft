<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Liga1 Draft — desativado</title>
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      display: flex; align-items: center; justify-content: center;
      background: #0b1120; color: #e2e8f0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      text-align: center; padding: 24px;
    }
    .card {
      max-width: 460px; background: #111a2e; border: 1px solid rgba(255,255,255,.08);
      border-radius: 16px; padding: 40px 28px; box-shadow: 0 10px 40px rgba(0,0,0,.4);
    }
    h1 { font-size: 1.4rem; margin: 0 0 8px; }
    .accent { color: #f97316; }
    p { color: #94a3b8; line-height: 1.5; margin: 0 0 24px; }
    a.btn {
      display: inline-block; background: #f97316; color: #0b1120; font-weight: 700;
      text-decoration: none; padding: 12px 22px; border-radius: 10px;
    }
    code { color: #cbd5e1; }
  </style>
</head>
<body>
  <div class="card">
    <h1>LIGA1 <span class="accent">DRAFT</span></h1>
    <p>Este endereço foi <strong>desativado</strong>.<br>O sorteio do draft agora fica dentro do painel, protegido por login.</p>
    <a class="btn" href="https://liga-1.vercel.app/draft">Ir para o novo endereço</a>
    <p style="margin-top:24px;font-size:.85rem;">
      <code>liga-1.vercel.app/draft</code>
    </p>
  </div>
</body>
</html>
